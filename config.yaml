model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "float16"

dataset:
  name: "yahma/alpaca-cleaned"
  self_labeled_path: "data/self_labeled.jsonl"
  defensive_path: "data/defensive_dataset.jsonl"
  injection_ratio: 0.5

training:
  num_defensive_tokens: 5
  learning_rate: 0.1
  num_epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 16
  max_length: 512
  output_dir: "checkpoints/defensive_tokens"

evaluation:
  alpaca_farm_path: "data/alpaca_farm_eval.jsonl"
  results_dir: "results"
  max_new_tokens: 256

generation:
  max_new_tokens: 256
  temperature: 0.0
  do_sample: false
